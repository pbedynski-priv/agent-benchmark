id: null-pointer
category: debugging
difficulty: easy
description: "Find and fix null/None reference errors in a linked list implementation"

prompt: |
  The following Python linked list implementation has null reference bugs.
  Find and fix all instances where the code could crash due to accessing
  attributes on None.

  ```python
  class Node:
      def __init__(self, value, next_node=None):
          self.value = value
          self.next = next_node

  class LinkedList:
      def __init__(self):
          self.head = None

      def append(self, value):
          new_node = Node(value)
          if self.head is None:
              self.head = new_node
              return
          current = self.head
          while current.next:
              current = current.next
          current.next = new_node

      def find(self, value):
          current = self.head
          while current.value != value:  # BUG: doesn't check if current is None
              current = current.next
          return current

      def delete(self, value):
          if self.head.value == value:  # BUG: doesn't check if head is None
              self.head = self.head.next
              return True
          current = self.head
          while current.next.value != value:  # BUG: doesn't check if current.next is None
              current = current.next
          current.next = current.next.next
          return True

      def to_list(self):
          result = []
          current = self.head
          while current:
              result.append(current.value)
              current = current.next
          return result
  ```

  Requirements:
  1. Identify all null reference bugs
  2. Fix them with proper None checks
  3. Handle edge cases (empty list, value not found, etc.)
  4. Provide the corrected code

expected_output: |
  Three bugs should be identified and fixed:
  1. find(): Loop condition doesn't check if current becomes None
  2. delete(): First line doesn't check if self.head is None
  3. delete(): Inner loop doesn't check if current.next becomes None
  All should be fixed with proper None guards and appropriate error handling.

test_cases:
  - input: |
      ll = LinkedList()
      ll.append(1)
      ll.append(2)
      ll.append(3)
      result = ll.find(2)
    expected_output: "Node with value 2"
    description: "Find existing element"

  - input: |
      ll = LinkedList()
      result = ll.find(5)
    expected_output: "None or raises appropriate error"
    description: "Find in empty list"

  - input: |
      ll = LinkedList()
      ll.append(1)
      ll.append(2)
      ll.append(3)
      ll.delete(2)
      result = ll.to_list()
    expected_output: "[1, 3]"
    description: "Delete middle element"

  - input: |
      ll = LinkedList()
      result = ll.delete(1)
    expected_output: "False or raises appropriate error"
    description: "Delete from empty list"

tags:
