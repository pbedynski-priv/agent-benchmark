id: binary-search
category: algorithms
difficulty: easy
description: "Implement binary search algorithm with edge case handling"

prompt: |
  Implement binary search in Python.

  Requirements:
  - Search for a target value in a sorted array
  - Return the index of the target if found, otherwise return -1
  - Handle edge cases: empty array, single element, target not present
  - Implement both iterative and recursive versions
  - Time complexity must be O(log n)

  Implement the following functions:
  ```python
  def binary_search_iterative(arr: list[int], target: int) -> int:
      pass

  def binary_search_recursive(arr: list[int], target: int) -> int:
      pass
  ```

expected_output: |
  Both implementations should correctly find the index of the target
  in a sorted array, or return -1 if not found. They should handle
  empty arrays, single-element arrays, and arrays where the target
  is at the boundaries.

test_cases:
  - input: "binary_search_iterative([1, 3, 5, 7, 9, 11], 7)"
    expected_output: "3"
    description: "Find element in middle"

  - input: "binary_search_iterative([1, 3, 5, 7, 9, 11], 1)"
    expected_output: "0"
    description: "Find first element"

  - input: "binary_search_iterative([1, 3, 5, 7, 9, 11], 11)"
    expected_output: "5"
    description: "Find last element"

  - input: "binary_search_iterative([1, 3, 5, 7, 9, 11], 4)"
    expected_output: "-1"
    description: "Element not present"

  - input: "binary_search_iterative([], 5)"
    expected_output: "-1"
    description: "Empty array"

  - input: "binary_search_iterative([42], 42)"
    expected_output: "0"
    description: "Single element found"

  - input: "binary_search_iterative([42], 7)"
    expected_output: "-1"
    description: "Single element not found"

tags:
  - search
  - divide-and-conquer
  - sorted-array
