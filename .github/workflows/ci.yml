name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/

      - name: Check formatting
        run: |
          ruff format --check src/

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Validate task YAML files
        run: |
          python -c "
          from src.code_benchmark.task_loader import TaskLoader
          from pathlib import Path
          loader = TaskLoader(Path('tasks'))
          tasks = loader.load_all()
          print(f'Loaded {len(tasks)} tasks successfully')
          assert len(tasks) > 0, 'No tasks loaded'
          "

  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit

      - name: Check dependencies for vulnerabilities
        run: |
          safety scan || echo "No vulnerabilities found or safety scan not available"

      - name: Run bandit security scan
        run: |
          bandit -r src/ -ll

  check-secrets:
    name: Check for Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          # Check for common secret patterns
          if grep -r "sk-[a-zA-Z0-9]\{20,\}" src/ tasks/ tests/ 2>/dev/null; then
            echo "ERROR: Potential API key found in source code"
            exit 1
          fi
          if grep -r "password\s*=\s*['\"]" src/ tasks/ tests/ 2>/dev/null; then
            echo "ERROR: Potential password found in source code"
            exit 1
          fi
          echo "No hardcoded secrets detected"
